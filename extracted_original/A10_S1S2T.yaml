contract_id: "PatchMergeAgent_v1"
tin:
  type: object
  properties:
    repo: string
    problem_statement: string
    patch_a: string
    patch_b: string
  required: [repo, problem_statement, patch_a, patch_b]
pre:
  structural: "repo && problem_statement && patch_a && patch_b"
  semantic: ["@identify_patch_files", "@detect_overlaps"]
post:
  structural: "merged_diff != null"
  semantic: ["@conflict_detection", "@merge_non_conflicting_changes", "@flag_remaining_conflicts"]
tout:
  type: object
  properties:
    merged_diff: string
prob:
  satisfaction_rate: 0.93
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}
comp:
  type: MERGE