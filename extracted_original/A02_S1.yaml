contract_id: diff-patch-generator-v1
tin:
  type: object
  properties:
    working_dir: string
    problem_statement: string
    localised_file: string
  required:
    - working_dir
    - problem_statement
    - localised_file
pre:
  structural: "working_dir != '' && problem_statement != '' && localised_file != ''"
  semantic: ["@valid_directory", "@valid_localized_file"]
post:
  structural: "type(output) == string && output.startswith('--- a/') && '+\n' in output && output.endswith('\n')"
  semantic: ["@valid_unified_diff_format", "@minimal_patch"]
tout:
  type: object
  properties:
    output: string
prob:
  satisfaction_rate: 1.0
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}
comp:
  type: SELECT