# Template
contract_id: A03-verifier-v1.0
agent_name: SWE-agent Verifier
description: 'Runs tests and reports pass/fail'
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    patch: 
      type: string            
    test_suite:
      type: string
  required: [patch, test_suite]     # Both fields are mandatory
 
pre:                          # When is it SAFE to call this agent?
  structural: 'patch != null and test_suite != null'
  semantic:
    - '@input_is_patch_and_tests'
 
post:                         # What must be TRUE about the output?
  structural: "'VERIFICATION RESULT:' in output and ('Verdict: PASS' in output or 'Verdict: FAIL' in output)"
  semantic:
    - '@output_is_verification_result' 
 
tout:                         # What the agent PRODUCES as output
  type: object
  properties:
    verdict: {type: string, enum: [PASS, FAIL]}
    details: {type: string}
 
prob:
  satisfaction_rate: 0.9333     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'