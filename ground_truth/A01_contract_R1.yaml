# Template
contract_id: A01-localiser-v1.0
agent_name: SWE-agent Localiser
description: 'Identifies the buggy file from a GitHub issue description'
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    issue:                    # Field name
      type: string            # Must be a string
      semantic: '@valid_github_issue'   # Meaningful issue, not empty
    repo:
      type: string
      format: uri             # Must be a URL
  required: [issue, repo]     # Both fields are mandatory
 
pre:                          # When is it SAFE to call this agent?
  structural: 'issue != null and repo != null and len(issue) > 0'
  semantic:
    - '@input_is_github_issue'   # Issue has reproducible info
 
post:                         # What must be TRUE about the output?
  structural: "output.startswith('LOCALISATION RESULT:') and 'File:' in output and 'Reason:' in output"
  semantic:
    - '@output_is_localisation_result'   # The file it mentions actually exists
 
tout:                         # What the agent PRODUCES as output
  type: object
  properties:
    file: {type: string}
    line: {type: integer}
    confidence: {type: number, minimum: 0, maximum: 1}
    reason: {type: string}
 
prob:
  satisfaction_rate: 1.0     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'