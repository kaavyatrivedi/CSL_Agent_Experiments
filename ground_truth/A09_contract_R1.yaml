# Template
contract_id: A09-buglocator-v1.0
agent_name: Custom BugLocator
description: 'Locates root cause from stack trace'
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    stack_trace: 
      type: string            
    repo:
      type: string
      format: uri
  required: [stack_trace, repo]     # Both fields are mandatory
 
pre:                          # When is it SAFE to call this agent?
  structural: 'stack_trace != null and repo != null and len(stack_trace) > 0'
  semantic:
    - '@input_is_stack_trace'
 
post:                         # What must be TRUE about the output?
  structural: "output.startswith('ROOT CAUSE ANALYSIS:') and 'Root cause location:' in output"
  semantic:
    - '@output_is_root_cause_analysis' 
 
tout:                         # What the agent PRODUCES as output
  type: object
  properties:
    file: {type: string}
    line: {type: integer}
    root_cause: {type: string}
 
prob:
  satisfaction_rate: 0.8     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'