# Template
contract_id: A14-codesummarizer-v1.0
agent_name: Custom CodeSummarizer
description: ‘Summarises what a function does’
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    code: 
      type: string
  required: [code]    
 
pre:                          # When is it SAFE to call this agent?
  structural: 'code != null and len(code) > 0'
  semantic:
    - '@input_is_code_function'
 
post:  # What must be TRUE about the output?
  structural: "output.startswith('CODE SUMMARY:') and 'Purpose:' in output and 'Inputs:' in output and 'Outputs:' in output"
  semantic:
    - '@output_is_code_summary' 
 
tout:                         # What the agent PRODUCES as output
  type: object
  properties:
    purpose: {type: string}
    inputs: {type: array}
    outputs: {type: array}

 
prob:
  satisfaction_rate: 0.8667     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'