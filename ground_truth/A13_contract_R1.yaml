# Template
contract_id: A13-issueparser-v1.0
agent_name: Custom IssueParser
description: ‘Extracts structured info from GitHub issues’
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    issue: 
      type: string
      semantic: '@valid_github_issue'            
  required: [issue]    
 
pre:                          # When is it SAFE to call this agent?
  structural: 'issue != null and len(issue) > 0'
  semantic:
    - '@input_is_github_issue'
 
post:  # What must be TRUE about the output?
  structural: "output.startswith('ISSUE PARSE RESULT:') and 'Affected components:' in output and 'Expected behaviour:' in output"
  semantic:
    - '@output_is_parsed_issue' 
 
tout:                         # What the agent PRODUCES as output
  type: object
  properties:
    components: {type: array}
    expected_behaviour: {type: string}
    actual_behavior: {type: string}

 
prob:
  satisfaction_rate: 1.0     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'