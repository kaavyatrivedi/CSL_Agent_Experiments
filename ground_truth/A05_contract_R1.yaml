# Template
contract_id: A05-filefinder-v1.0
agent_name: OpenHands FileFinder
description: ‘Locates relevant files in repo’
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    query: 
      type: string            
    repo:
      type: string
      format: uri
  required: [query, repo]     # Both fields are mandatory
 
pre:                          # When is it SAFE to call this agent?
  structural: 'query != null and repo != null and len(query) > 0'
  semantic:
    - '@input_is_file_search_query'
 
post:                         # What must be TRUE about the output?
  structural: "output.startswith('RELEVANT FILES:')"
  semantic:
    - '@output_is_file_list' 
 
tout:                         # What the agent PRODUCES as output
  type: array
  items:
    file: {type: string}
    relevance: {type: number}
 
prob:
  satisfaction_rate: 0.8     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'