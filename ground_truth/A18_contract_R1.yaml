# Template
contract_id: A18-samedev-v1.0
agent_name: Same.dev
description: ‘Clones and replicates existing UI designs’
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    design: 
      type: string
      semantic: '@valid_ui_design'
  required: [design]    
 
pre:                          # When is it SAFE to call this agent?
  structural: 'design != null'
  semantic:
    - '@input_is_ui_design'
 
post:  # What must be TRUE about the output?
  structural: "'```' in output and ('className' in output or 'import ' in output)"
  semantic:
    - '@output_is_ui_clone' 
 
tout:                         # What the agent PRODUCES as output
  type: string # ui clone

 
prob:
  satisfaction_rate: 0.6     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'