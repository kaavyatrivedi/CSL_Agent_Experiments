# Template
contract_id: A04-codewriter-v1.0
agent_name: OpenHands CodeWriter
description: ‘Writes new code from spec’
 
tin:                          # What the agent ACCEPTS as input
  type: object
  properties:
    spec: 
      type: string            
    repo:
      type: string
      format: uri
  required: [spec, repo]     # Both fields are mandatory
 
pre:                          # When is it SAFE to call this agent?
  structural: 'spec != null and repo != null and len(spec) > 0'
  semantic:
    - '@input_is_code_specification'
 
post:                         # What must be TRUE about the output?
  structural: "output.startswith('FILE:') and '```' in output"
  semantic:
    - '@output_is_code_file' 
 
tout:                         # What the agent PRODUCES as output
  type: object
  properties:
    file: {type: string}
    code: {type: string}
 
prob:
  satisfaction_rate: 0.6667     # Fill from traces: successes / total
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal:          # Fill from traces: compute mean/std of log(latency)
    mu: 0.0
    sigma: 0.0
  p95_latency_ms: 0.0        # 95th percentile from traces
 
comp:
  type: SELECT                # How to combine outputs if run in parallel
  scoring_fn: '@highest_confidence'