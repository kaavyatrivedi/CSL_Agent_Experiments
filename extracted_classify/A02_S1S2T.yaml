contract_id: PatchGen-1.0

tin:
  type: object
  properties:
    issue: string
    localised_file: string
    repo: string
  required: 
    - issue
    - localised_file
    - repo

pre:
  structural: true
  semantic: 
    - '@input_is_github_issue'
    - '@input_has_file_location'

post:
  structural: true
  semantic: 
    - '@output_is_valid_patch'

tout:
  type: object
  properties:
    patch: string

prob:
  satisfaction_rate: 1.0
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: SELECT