contract_id: AgentMode-v1

tin:
  type: object
  properties: 
    query: string
    shell_command: string
  required: 
    - query

pre:
  structural: "query != ''"
  semantic: 
    - '@input_is_terminal_task'

post:
  structural: "block.exit_code == 0"
  semantic: 
    - '@output_is_shell_script'

tout:
  type: object
  properties: 
    block_id: string
    command_text: string
    output: string
    exit_code: integer
    duration: number

prob:
  satisfaction_rate: 0.73
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: RESOLVE