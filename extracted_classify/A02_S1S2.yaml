contract_id: unified-diff-patch-generator-v1

tin:
  type: object
  properties:
    working_dir: string
    problem_statement: string
    localised_file: string
  required: 
    - working_dir
    - problem_statement
    - localised_file

pre:
  structural: working_dir is not None and problem_statement is not None and localised_file is not None
  semantic: 
    - '@input_is_github_issue'
    - '@input_has_file_location'

post:
  structural: true
  semantic: 
    - '@output_is_valid_patch'

tout:
  type: object
  properties: 
    diff_block: string

prob:
  satisfaction_rate: 1.0
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: SELECT