contract_id: v0-1.0

tin:
  type: object
  properties:
    issue: string
    repo: string
  required: 
    - issue
    - repo

pre:
  structural: issue AND repo
  semantic: 
    - '@input_is_github_issue'
    - '@input_has_file_location'

post:
  structural: id AND webUrl AND latestVersion AND messages
  semantic: 
    - '@output_is_code_file'
    - '@output_is_parsed_issue'

tout:
  type: object
  properties:
    id: string
    webUrl: string
    latestVersion: 
      type: object
      properties:
        id: string
        status: string
        demoUrl: string
        files: 
          type: array
          items: 
            type: object
            properties:
              name: string
              content: string
    messages: 
      type: array
      items:
        type: object
        properties:
          role: string
          content: string
          finishReason: string

prob:
  satisfaction_rate: 0.83
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: RESOLVE