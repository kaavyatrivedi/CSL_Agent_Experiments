contract_id: StackTraceRootCauseAnalyzer_v1

tin:
  type: object
  properties:
    stack_trace:
      type: string
    repo:
      type: string
  required: 
    - stack_trace
    - repo

pre:
  structural: "stack_trace != '' and repo != ''"
  semantic: 
    - '@input_is_stack_trace'

post:
  structural: "output contains 'ROOT CAUSE ANALYSIS'"
  semantic:
    - '@output_is_root_cause_analysis'

tout:
  type: object
  properties:
    ROOT CAUSE ANALYSIS:
      type: string

prob:
  satisfaction_rate: 0.8
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: RESOLVE