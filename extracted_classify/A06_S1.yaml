contract_id: OpenHandsTestGen-v1

tin:
  type: object
  properties:
    function_or_spec: string
  required: 
    - function_or_spec

pre:
  structural: "function_or_spec in tin and tin['function_or_spec'] is not None"
  semantic:
    - '@input_is_code_specification'

post:
  structural: "tout contains 'relative_path_to_test_file'"
  semantic:
    - '@output_preserves_test_files'
    - '@output_is_code_file'

tout:
  type: object
  properties:
    relative_path_to_test_file: string

prob:
  satisfaction_rate: 0.8
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: SELECT