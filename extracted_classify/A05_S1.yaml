contract_id: OpenHands FileFinder v1.0

tin:
  type: object
  properties:
    problem_statement: string
  required: [problem_statement]

pre:
  structural: true
  semantic: ['@input_is_github_issue']

post:
  structural: true
  semantic: ['@output_is_file_list']

tout:
  type: object
  properties:
    relevant_files:
      type: array
      items:
        type: object
        properties:
          path: string
          relevance: string

prob:
  satisfaction_rate: 0.8
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: SELECT