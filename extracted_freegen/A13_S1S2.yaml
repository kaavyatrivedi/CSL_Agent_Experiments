contract_id: "GitHubIssueParser-v1"

tin:
  type: object
  properties:
    repo:
      type: string
    problem_statement:
      type: string
  required:
    - repo
    - problem_statement

pre:
  structural: true
  semantic: 
    - '@input_is_github_issue'

post:
  structural: true
  semantic:
    - '@output_is_parsed_issue'

tout:
  type: object
  properties:
    Title:
      type: string
    Error type:
      type: string
    Affected components:
      type: string
    Expected behaviour:
      type: string
    Actual behaviour:
      type: string
    Reproduction steps:
      type: string
    Environment:
      type: string
    Additional context:
      type: string

prob:
  satisfaction_rate: 1.0
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: SELECT