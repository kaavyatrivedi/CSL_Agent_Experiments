contract_id: "RootCauseAnalyzer_v1"

tin:
  type: object
  properties:
    stack_trace: string
    repo: string
  required: ["stack_trace", "repo"]

pre:
  structural: "stack_trace is not None and repo is not None"
  semantic: ["@input_is_stack_trace"]

post:
  structural: "output is not None"
  semantic: ["@output_is_root_cause_analysis"]

tout:
  type: object
  properties:
    error_type: string
    root_cause_location: string
    explanation: string
    alternatives: string

prob:
  satisfaction_rate: 0.8
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: SELECT