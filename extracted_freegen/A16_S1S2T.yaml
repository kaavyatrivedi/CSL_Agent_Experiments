  properties:
    code_preview: string
    live_update_url: string

prob:
  satisfaction_rate: 0.4
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: CONCAT