contract_id: VerificationAgentV1

tin:
  type: object
  properties:
    issue: string
    repo: string
  required: [issue, repo]

pre:
  structural: true
  semantic: ['@input_is_patch_and_tests']

post:
  structural: true
  semantic: ['@output_is_verification_result']

tout:
  type: object
  properties: 
    verification_result: string

prob:
  satisfaction_rate: 0.93
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}

comp:
  type: RESOLVE