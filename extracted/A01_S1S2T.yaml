contract_id: "SWE-agent+v1.0"
tin:
  type: object
  properties:
    issue:
      type: string
    repo:
      type: string
  required:
    - issue
    - repo
pre:
  structural: "contains(issue, 'Description') and contains(issue, 'repo')"
  semantic: 
    - "@issue_contains_specific_function_or_class"
    - "@repo_exists_and_accessible"
post:
  structural: "contains(output, 'LOCALISATION RESULT:')"
  semantic:
    - "@correct_file_identified_from_issue_description"
    - "@reasoning_is_relevant_and_concise"
tout:
  type: object
  properties:
    output:
      type: string
prob:
  satisfaction_rate: 1.0
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}
comp:
  type: RESOLVE