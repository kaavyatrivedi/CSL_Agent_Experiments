contract_id: patch-merge-agent-v1
tin:
  type: object
  properties:
    repo:
      type: string
    problem_statement:
      type: string
    patch_a:
      type: string
    patch_b:
      type: string
  required: [repo, patch_a, patch_b]
pre:
  structural: "repo != '' && patch_a != '' && patch_b != ''"
  semantic: []
post:
  structural: "output.contains('--- a/') && output.contains('+++ b/')"
  semantic: [@detect_unified_diff_format, @flag_conflicts]
tout:
  type: object
  properties:
    output:
      type: string
prob:
  satisfaction_rate: 0.93
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}
comp:
  type: MERGE