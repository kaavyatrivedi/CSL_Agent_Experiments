contract_id: PatchMergerAgent1.0
tin:
  type: object
  properties:
    repo: string
    problem_statement: string
    patch_a: string
    patch_b: string
  required:
    - repo
    - patch_a
    - patch_b
pre:
  structural: "repo && patch_a && patch_b"
  semantic: [@valid_patch_syntax, @matching_repository]
post:
  structural: "merged_patch || conflict_marker"
  semantic: [@unified_diff_with_all_changes, @conflict_markers_for_unresolved_conflicts]
tout:
  type: object
  properties:
    merged_patch: string
    conflict_marker: string
prob:
  satisfaction_rate: 0.93
  confidence_delta: 0.05
  min_sample_k: 30
  latency_lognormal: {mu: 0.0, sigma: 0.0}
comp:
  type: MERGE